version = "1"

# Anthropic does not publish exact token limits. These are community estimates
# (Faros AI, Portkey, IntuitionLabs) based on empirical testing, April 2026.
# Limits count input + output + cache_creation tokens only; cache_read tokens
# are billed at 10% and do not appear to count against the rolling window.
# Off-peak hours (6pm–5am PT weekdays, all day weekends) grant higher limits.
# A separate weekly cap also applies — not tracked here.

[claude.pro]
last_verified = "2026-04-20"
window_hours = 5
tokens_per_window = 44000
cost_usd_per_day = 3.33

